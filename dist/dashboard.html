<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPC 数据看板</title>
<meta name="description" content="全国OPC政策数据看板 - 城市对比、补贴排行、社区统计">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<style>
:root{--bg:#F7F8FA;--card:#FFFFFF;--card2:#F1F5F9;--border:#E2E8F0;--text:#0F172A;--dim:#64748B;--accent:#2563EB;--al:#2563EB;--green:#15803D;--yellow:#B45309;--red:#B91C1C;--cyan:#0F766E;--blue:#2563EB;--orange:#B45309}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--al);text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:20px}
h1{font-size:1.8em;margin-bottom:4px}
.sub{color:var(--dim);font-size:.9em;margin-bottom:30px}

/* Stats Grid */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:30px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;transition:all .3s}
.stat:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.stat .n{font-size:2.4em;font-weight:800;line-height:1}.stat .l{font-size:.78em;color:var(--dim);margin-top:4px}

/* Charts */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px}
.chart-card h3{font-size:1.1em;margin-bottom:16px;color:var(--al)}

/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:60px;font-size:.82em;color:var(--dim);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:24px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width 1s ease;display:flex;align-items:center;padding:0 8px}
.bar-fill span{font-size:.72em;font-weight:600;color:#fff;white-space:nowrap}
.bar-value{width:50px;font-size:.82em;font-weight:600;text-align:left;flex-shrink:0}

/* Donut */
.donut-wrap{display:flex;align-items:center;gap:24px}
.donut{width:140px;height:140px;position:relative}
.donut svg{width:100%;height:100%;transform:rotate(-90deg)}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-center .n{font-size:1.6em;font-weight:800;line-height:1}.donut-center .l{font-size:.7em;color:var(--dim)}
.legend{display:flex;flex-direction:column;gap:6px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:.85em}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* City ranking */
.ranking{display:flex;flex-direction:column;gap:8px}
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg);border-radius:8px;transition:all .2s}
.rank-item:hover{background:var(--card2)}
.rank-num{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:700;flex-shrink:0}
.rank-1{background:rgba(255,214,0,.15);color:var(--yellow)}
.rank-2{background:rgba(21,128,61,.1);color:var(--green)}
.rank-3{background:rgba(15,118,110,.1);color:var(--cyan)}
.rank-other{background:rgba(0,0,0,.04);color:var(--dim)}
.rank-name{flex:1;font-weight:500}.rank-val{font-weight:700;color:var(--cyan);font-size:.95em}

/* Timeline */
.timeline{display:flex;flex-direction:column;gap:10px}
.tl-item{display:flex;gap:12px;padding:10px 14px;background:var(--bg);border-radius:8px}
.tl-date{width:90px;flex-shrink:0;font-size:.82em;color:var(--al);font-weight:600}
.tl-content{flex:1;font-size:.88em}
.tl-city{font-size:.75em;padding:1px 6px;border-radius:4px;background:rgba(37,99,235,.1);color:var(--al)}
.tl-urgent{color:var(--red);font-weight:600}

/* Top nav */
.topnav{display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(255,255,255,.95);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.topnav .logo{font-weight:800;font-size:1em;color:var(--al)}
.topnav a{padding:6px 14px;border-radius:6px;font-size:.82em;color:var(--dim);transition:all .2s}
.topnav a:hover,.topnav a.active{color:var(--al);background:rgba(37,99,235,.08)}
.topnav .spacer{flex:1}
.nav-dropdown{position:relative;display:inline-flex}
.nav-dropdown-trigger{padding:6px 14px;border-radius:6px;font-size:.82em;color:var(--dim,var(--text-dim,#64748B));cursor:pointer;transition:all .2s;background:none;border:none;font-family:inherit;text-decoration:none}
.nav-dropdown-trigger:hover,.nav-dropdown.open .nav-dropdown-trigger{color:var(--al,var(--accent-light,var(--accent,#2563EB)));background:rgba(37,99,235,.08)}
.nav-dropdown-menu{display:none;position:absolute;top:100%;left:0;background:#fff;border:1px solid var(--border,#E2E8F0);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:120px;z-index:200;padding:4px 0}
.nav-dropdown.open .nav-dropdown-menu{display:block}
.nav-dropdown-menu a{display:block;padding:8px 16px;font-size:.82em;color:var(--text,#0F172A);text-decoration:none;transition:background .2s;white-space:nowrap}
.nav-dropdown-menu a:hover{background:rgba(37,99,235,.06);color:var(--al,var(--accent,#2563EB))}
.nav-dropdown-menu a.active{color:var(--al,var(--accent,#2563EB));font-weight:600}

/* Compare tool */
.compare-section{margin-bottom:30px}
.compare-section h2{font-size:1.3em;margin-bottom:16px;color:var(--al)}
.compare-controls{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.compare-controls select{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:.9em;min-width:160px;cursor:pointer}
.compare-controls select:focus{outline:none;border-color:var(--accent)}
.compare-controls span{color:var(--dim);font-size:.9em}
.compare-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.compare-table th,.compare-table td{padding:14px 18px;text-align:center}
.compare-table th{background:var(--card2);color:var(--al);font-size:.85em;font-weight:600;border-bottom:1px solid var(--border)}
.compare-table td{font-size:.92em;border-bottom:1px solid rgba(42,42,58,.5)}
.compare-table tr:last-child td{border-bottom:none}
.compare-table td:first-child{color:var(--dim);text-align:left;font-size:.85em}
.compare-table .highlight{color:var(--green);font-weight:700}

@media(max-width:768px){.chart-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.compare-controls{flex-direction:column}}
</style>
<script src="assets/js/schedule.js" defer></script>
</head>
<body>
<nav class="topnav">
  <span class="logo">OPC</span>
  <a href="index.html">首页</a>
  <div class="nav-dropdown" onclick="this.classList.toggle('open')">
    <a class="nav-dropdown-trigger">城市 ▾</a>
    <div class="nav-dropdown-menu">
      <a href="guangzhou.html">广州</a>
      <a href="chengdu.html">成都</a>
      <a href="suzhou.html">苏州</a>
      <a href="yuexiu.html">越秀区</a>
    </div>
  </div>
  <a href="compare.html">对比</a>
  <a href="tax.html">税务</a>
  <a href="changelog.html">更新记录</a>
</nav>

<div class="container">
  <h1>OPC 全国数据看板</h1>
  <p class="sub">实时政策数据统计与分析</p>

  <div class="stats" id="statsGrid"></div>

  <div class="chart-grid">
    <div class="chart-card">
      <h3>各城市政策数量</h3>
      <div class="bar-chart" id="cityBars"></div>
    </div>
    <div class="chart-card">
      <h3>政策类型分布</h3>
      <div class="donut-wrap">
        <div class="donut" id="categoryDonut"></div>
        <div class="legend" id="categoryLegend"></div>
      </div>
    </div>
  </div>

  <div class="chart-grid">
    <div class="chart-card">
      <h3>最高补贴金额排行（万元）</h3>
      <div class="ranking" id="amountRanking"></div>
    </div>
    <div class="chart-card">
      <h3>即将到期的政策</h3>
      <div class="timeline" id="deadlineTimeline"></div>
    </div>
  </div>

  <div class="chart-grid">
    <div class="chart-card">
      <h3>OPC社区/孵化器数量</h3>
      <div class="bar-chart" id="communityBars"></div>
    </div>
    <div class="chart-card">
      <h3>数据验证状态</h3>
      <div class="donut-wrap">
        <div class="donut" id="verifyDonut"></div>
        <div class="legend" id="verifyLegend"></div>
      </div>
    </div>
  </div>

  <div class="chart-grid">
    <div class="chart-card">
      <h3>省份政策分布</h3>
      <div class="bar-chart" id="provinceBars"></div>
    </div>
    <div class="chart-card">
      <h3>补贴类型分布</h3>
      <div class="donut-wrap">
        <div class="donut" id="benefitDonut"></div>
        <div class="legend" id="benefitLegend"></div>
      </div>
    </div>
  </div>

  <div class="compare-section">
    <h2>城市对比工具</h2>
    <div class="compare-controls">
      <select id="compareA"><option value="">选择城市A</option></select>
      <span>VS</span>
      <select id="compareB"><option value="">选择城市B</option></select>
    </div>
    <table class="compare-table" id="compareTable" style="display:none">
      <thead><tr><th>指标</th><th id="thA">城市A</th><th id="thB">城市B</th></tr></thead>
      <tbody id="compareBody"></tbody>
    </table>
    <div id="comparePlaceholder" style="color:var(--dim);text-align:center;padding:30px;background:var(--card);border:1px solid var(--border);border-radius:14px">请选择两个城市进行对比</div>
  </div>
</div>

<script>
const SPECIAL_CITY_PAGES = {
  '广州': 'guangzhou.html',
  '成都': 'chengdu.html',
  '苏州': 'suzhou.html',
};

function getCityDetailHref(city) {
  return SPECIAL_CITY_PAGES[city] || `seo/cities/${encodeURIComponent(city)}.html`;
}

// Load data from JSON directly (static mode) or API
async function loadDashboard() {
  // 1. 加载本地 policies.json
  const resp = await fetch('data/policies.json');
  const raw = await resp.json();
  let policies = raw.policies || [];

  // 2. 合并爬虫新发现的政策
  try {
    const crawlerResp = await fetch('https://opc-crawler.siuserxy.workers.dev/extracted', {
      signal: AbortSignal.timeout(5000)
    });
    if (crawlerResp.ok) {
      const crawlerData = await crawlerResp.json();
      const newPolicies = crawlerData.policies || [];
      const existingIds = new Set(policies.map(p => p.id));
      const existingNames = new Set(policies.map(p => p.name));
      for (const p of newPolicies) {
        if (!existingIds.has(p.id) && !existingNames.has(p.name)) {
          p.auto_extracted = true;
          policies.push(p);
        }
      }
    }
  } catch(e) { console.log('[Crawler] 跳过合并:', e.message); }

  renderDashboard(computeDashboard(policies));
}

function computeDashboard(policies) {
  const cityStats = {};
  const categories = {};
  const benefitTypes = {};
  const provinceStats = {};
  let totalMax = 0;
  let verified = 0;

  policies.forEach(p => {
    const city = p.city || 'unknown';
    const province = p.province || '未知';
    if (!provinceStats[province]) provinceStats[province] = 0;
    provinceStats[province]++;
    if (!cityStats[city]) cityStats[city] = {count:0, max_amount:0, categories:[], communities:0, main_category:{}};
    cityStats[city].count++;
    const cat = p.category||'other';
    cityStats[city].main_category[cat] = (cityStats[city].main_category[cat]||0)+1;
    (p.benefits||[]).forEach(b => {
      cityStats[city].max_amount = Math.max(cityStats[city].max_amount, b.amount_max||0);
      totalMax += b.amount_max||0;
      benefitTypes[b.type||'other'] = (benefitTypes[b.type||'other']||0)+1;
    });
    cityStats[city].communities += (p.communities||[]).length;
    categories[p.category||'other'] = (categories[p.category||'other']||0)+1;
    if (p.verified) verified++;
  });

  const upcoming = [];
  const now = new Date();
  policies.forEach(p => {
    const app = p.application || {};
    const end = window.Schedule ? window.Schedule.nextDeadline(app.schedule || app.deadline) : (app.deadline || null);
    if (!end) return;
    try {
      const d = new Date(end);
      const days = Math.ceil((d - now) / 86400000);
      if (days > 0 && days <= 60) upcoming.push({name:p.name, city:p.city, deadline:end, days_left:days});
    } catch(e){}
  });
  upcoming.sort((a,b) => a.days_left - b.days_left);

  return {
    total_policies: policies.length,
    total_cities: Object.keys(cityStats).length,
    total_provinces: Object.keys(provinceStats).length,
    total_communities: Object.values(cityStats).reduce((s,c) => s+c.communities, 0),
    total_max_amount: totalMax,
    city_stats: cityStats,
    province_stats: provinceStats,
    categories,
    benefit_types: benefitTypes,
    upcoming_deadlines: upcoming,
    verified,
    unverified: policies.length - verified
  };
}

function renderDashboard(d) {
  // Stats
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat"><div class="n" style="color:var(--cyan)">${d.total_policies}</div><div class="l">政策总数</div></div>
    <div class="stat"><div class="n" style="color:var(--green)">${d.total_cities}</div><div class="l">覆盖城市</div></div>
    <div class="stat"><div class="n" style="color:var(--al)">${d.total_communities}</div><div class="l">OPC社区/孵化器</div></div>
    <div class="stat"><div class="n" style="color:var(--yellow)">${d.verified}</div><div class="l">已验证政策</div></div>
    <div class="stat"><div class="n" style="color:var(--orange)">${d.upcoming_deadlines.length}</div><div class="l">近期截止</div></div>
  `;

  // City bars
  const cities = Object.entries(d.city_stats).sort((a,b) => b[1].count - a[1].count);
  const maxCount = Math.max(...cities.map(c => c[1].count));
  const colors = ['#15803D','#2563EB','#B91C1C','#B45309','#0F766E','#B45309','#e040fb','#76ff03','#64b5f6','#ffab40','#ff6e40'];
  document.getElementById('cityBars').innerHTML = cities.map(([city, s], i) => `
    <a href="${getCityDetailHref(city)}" class="bar-row" style="text-decoration:none;color:inherit">
      <div class="bar-label">${city}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(s.count/maxCount*100)}%;background:${colors[i%colors.length]}">
          <span>${s.count} 条</span>
        </div>
      </div>
    </a>
  `).join('');

  // Category donut
  const catMap = {comprehensive:'综合',subsidy:'补贴',space:'空间',computing:'算力',scenario:'场景',competition:'赛事',registration:'注册',talent:'人才',tax:'税优',loan:'贷款'};
  const catColors = ['#2563EB','#15803D','#2563EB','#0F766E','#B45309','#B45309','#B91C1C','#e040fb','#76ff03','#64b5f6'];
  const catEntries = Object.entries(d.categories).sort((a,b) => b[1]-a[1]);
  const catTotal = catEntries.reduce((s,e) => s+e[1], 0);
  let catOffset = 0;
  const catCircles = catEntries.map(([cat,count], i) => {
    const pct = count / catTotal;
    const dash = pct * 314;
    const gap = 314 - dash;
    const circle = `<circle cx="70" cy="70" r="50" fill="none" stroke="${catColors[i%catColors.length]}" stroke-width="18" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-catOffset}" />`;
    catOffset += dash;
    return circle;
  });
  document.getElementById('categoryDonut').innerHTML = `
    <svg viewBox="0 0 140 140">${catCircles.join('')}</svg>
    <div class="donut-center"><div class="n">${catTotal}</div><div class="l">总政策数</div></div>
  `;
  document.getElementById('categoryLegend').innerHTML = catEntries.map(([cat,count], i) => `
    <div class="legend-item"><div class="legend-dot" style="background:${catColors[i%catColors.length]}"></div>${catMap[cat]||cat} (${count})</div>
  `).join('');

  // Amount ranking
  const amtRank = cities.filter(c => c[1].max_amount > 0).sort((a,b) => b[1].max_amount - a[1].max_amount);
  document.getElementById('amountRanking').innerHTML = amtRank.map(([city, s], i) => `
    <a href="${getCityDetailHref(city)}" class="rank-item" style="text-decoration:none;color:inherit">
      <div class="rank-num ${i<3?'rank-'+(i+1):'rank-other'}">${i+1}</div>
      <div class="rank-name">${city}</div>
      <div class="rank-val">${(s.max_amount/10000).toLocaleString()}万</div>
    </a>
  `).join('');

  // Deadlines
  const tl = d.upcoming_deadlines.slice(0, 8);
  document.getElementById('deadlineTimeline').innerHTML = tl.length
    ? tl.map(t => `
      <div class="tl-item">
        <div class="tl-date">${t.deadline}</div>
        <div class="tl-content">
          ${t.name} <span class="tl-city">${t.city}</span>
          <span class="${t.days_left<=7?'tl-urgent':''}"> (${t.days_left}天后)</span>
        </div>
      </div>
    `).join('')
    : '<div style="color:var(--dim);padding:20px;text-align:center">暂无近期截止政策</div>';

  // Community bars
  const commCities = cities.filter(c => c[1].communities > 0).sort((a,b) => b[1].communities - a[1].communities);
  const maxComm = Math.max(...commCities.map(c => c[1].communities), 1);
  document.getElementById('communityBars').innerHTML = commCities.map(([city, s], i) => `
    <div class="bar-row">
      <div class="bar-label">${city}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(s.communities/maxComm*100)}%;background:${colors[i%colors.length]}">
          <span>${s.communities} 个</span>
        </div>
      </div>
    </div>
  `).join('');

  // Verify donut
  const vTotal = d.verified + d.unverified;
  const vPct = d.verified / vTotal;
  const vDash = vPct * 314;
  document.getElementById('verifyDonut').innerHTML = `
    <svg viewBox="0 0 140 140">
      <circle cx="70" cy="70" r="50" fill="none" stroke="#1b5e20" stroke-width="18" stroke-dasharray="${vDash} ${314-vDash}" stroke-dashoffset="0" />
      <circle cx="70" cy="70" r="50" fill="none" stroke="#4a1515" stroke-width="18" stroke-dasharray="${314-vDash} ${vDash}" stroke-dashoffset="${-vDash}" />
    </svg>
    <div class="donut-center"><div class="n">${Math.round(vPct*100)}%</div><div class="l">已验证</div></div>
  `;
  document.getElementById('verifyLegend').innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:#15803D"></div>已验证 (${d.verified})</div>
    <div class="legend-item"><div class="legend-dot" style="background:#B91C1C"></div>待验证 (${d.unverified})</div>
  `;

  // Province bars
  const provinces = Object.entries(d.province_stats).sort((a,b) => b[1]-a[1]);
  const maxProv = Math.max(...provinces.map(p => p[1]), 1);
  const provColors = ['#2563EB','#15803D','#2563EB','#0F766E','#B45309','#B45309','#B91C1C','#e040fb','#76ff03','#64b5f6','#ffab40','#ff6e40','#3B82F6','#69f0ae','#82b1ff'];
  document.getElementById('provinceBars').innerHTML = provinces.map(([prov, count], i) => `
    <div class="bar-row">
      <div class="bar-label">${prov}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(count/maxProv*100)}%;background:${provColors[i%provColors.length]}">
          <span>${count} 条</span>
        </div>
      </div>
    </div>
  `).join('');

  // Benefit type donut
  const btMap = {rent_free:'免租',cash:'现金补贴',voucher:'代金券',loan:'贷款',tax:'税收优惠',other:'其他'};
  const btColors = ['#15803D','#2563EB','#B45309','#B45309','#2563EB','#B91C1C','#0F766E','#e040fb'];
  const btEntries = Object.entries(d.benefit_types).sort((a,b) => b[1]-a[1]);
  const btTotal = btEntries.reduce((s,e) => s+e[1], 0);
  let btOffset = 0;
  const btCircles = btEntries.map(([type,count], i) => {
    const pct = count / btTotal;
    const dash = pct * 314;
    const gap = 314 - dash;
    const circle = `<circle cx="70" cy="70" r="50" fill="none" stroke="${btColors[i%btColors.length]}" stroke-width="18" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-btOffset}" />`;
    btOffset += dash;
    return circle;
  });
  document.getElementById('benefitDonut').innerHTML = `
    <svg viewBox="0 0 140 140">${btCircles.join('')}</svg>
    <div class="donut-center"><div class="n">${btTotal}</div><div class="l">补贴项</div></div>
  `;
  document.getElementById('benefitLegend').innerHTML = btEntries.map(([type,count], i) => `
    <div class="legend-item"><div class="legend-dot" style="background:${btColors[i%btColors.length]}"></div>${btMap[type]||type} (${count})</div>
  `).join('');

  // City compare tool
  const cityList = Object.keys(d.city_stats).sort();
  const optionsHtml = cityList.map(c => `<option value="${c}">${c}</option>`).join('');
  const selA = document.getElementById('compareA');
  const selB = document.getElementById('compareB');
  selA.innerHTML = '<option value="">选择城市A</option>' + optionsHtml;
  selB.innerHTML = '<option value="">选择城市B</option>' + optionsHtml;

  function updateCompare() {
    const a = selA.value, b = selB.value;
    if (!a || !b) {
      document.getElementById('compareTable').style.display = 'none';
      document.getElementById('comparePlaceholder').style.display = 'block';
      return;
    }
    document.getElementById('compareTable').style.display = 'table';
    document.getElementById('comparePlaceholder').style.display = 'none';
    document.getElementById('thA').innerHTML = `<a href="${getCityDetailHref(a)}" style="color:var(--al)">${a} →</a>`;
    document.getElementById('thB').innerHTML = `<a href="${getCityDetailHref(b)}" style="color:var(--al)">${b} →</a>`;
    const sa = d.city_stats[a], sb = d.city_stats[b];
    const topCat = s => {
      const entries = Object.entries(s.main_category||{});
      if (!entries.length) return '-';
      const catMap = {comprehensive:'综合',subsidy:'补贴',space:'空间',computing:'算力',scenario:'场景',competition:'赛事',registration:'注册',talent:'人才',tax:'税优',loan:'贷款'};
      entries.sort((x,y) => y[1]-x[1]);
      return (catMap[entries[0][0]]||entries[0][0]);
    };
    const rows = [
      ['政策数量', sa.count, sb.count],
      ['最高补贴（万元）', (sa.max_amount/10000).toLocaleString(), (sb.max_amount/10000).toLocaleString()],
      ['OPC社区/孵化器', sa.communities, sb.communities],
      ['主要类型', topCat(sa), topCat(sb)]
    ];
    document.getElementById('compareBody').innerHTML = rows.map(([label, va, vb]) => {
      const hlA = (typeof va === 'number' && typeof vb === 'number' && va > vb) ? ' highlight' : '';
      const hlB = (typeof va === 'number' && typeof vb === 'number' && vb > va) ? ' highlight' : '';
      return `<tr><td>${label}</td><td class="${hlA}">${va}</td><td class="${hlB}">${vb}</td></tr>`;
    }).join('');
  }
  selA.onchange = updateCompare;
  selB.onchange = updateCompare;
}

loadDashboard();
</script>
