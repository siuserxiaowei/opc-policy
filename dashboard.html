<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPC 数据看板</title>
<meta name="description" content="全国OPC政策数据看板 - 城市对比、补贴排行、社区统计">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<style>
:root{--bg:#0a0a0f;--card:#12121a;--card2:#1a1a28;--border:#2a2a3a;--text:#e0e0e8;--dim:#8888a0;--accent:#6c5ce7;--al:#a29bfe;--green:#00e676;--yellow:#ffd600;--red:#ff5252;--cyan:#00e5ff;--blue:#448aff;--orange:#ff9100}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--al);text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:20px}
h1{font-size:1.8em;margin-bottom:4px}
.sub{color:var(--dim);font-size:.9em;margin-bottom:30px}

/* Stats Grid */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:30px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;transition:all .3s}
.stat:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.stat .n{font-size:2.4em;font-weight:800;line-height:1}.stat .l{font-size:.78em;color:var(--dim);margin-top:4px}

/* Charts */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px}
.chart-card h3{font-size:1.1em;margin-bottom:16px;color:var(--al)}

/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:60px;font-size:.82em;color:var(--dim);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:24px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width 1s ease;display:flex;align-items:center;padding:0 8px}
.bar-fill span{font-size:.72em;font-weight:600;color:#fff;white-space:nowrap}
.bar-value{width:50px;font-size:.82em;font-weight:600;text-align:left;flex-shrink:0}

/* Donut */
.donut-wrap{display:flex;align-items:center;gap:24px}
.donut{width:140px;height:140px;position:relative}
.donut svg{width:100%;height:100%;transform:rotate(-90deg)}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-center .n{font-size:1.6em;font-weight:800;line-height:1}.donut-center .l{font-size:.7em;color:var(--dim)}
.legend{display:flex;flex-direction:column;gap:6px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:.85em}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* City ranking */
.ranking{display:flex;flex-direction:column;gap:8px}
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg);border-radius:8px;transition:all .2s}
.rank-item:hover{background:var(--card2)}
.rank-num{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:700;flex-shrink:0}
.rank-1{background:rgba(255,214,0,.15);color:var(--yellow)}
.rank-2{background:rgba(0,230,118,.1);color:var(--green)}
.rank-3{background:rgba(0,229,255,.1);color:var(--cyan)}
.rank-other{background:rgba(255,255,255,.05);color:var(--dim)}
.rank-name{flex:1;font-weight:500}.rank-val{font-weight:700;color:var(--cyan);font-size:.95em}

/* Timeline */
.timeline{display:flex;flex-direction:column;gap:10px}
.tl-item{display:flex;gap:12px;padding:10px 14px;background:var(--bg);border-radius:8px}
.tl-date{width:90px;flex-shrink:0;font-size:.82em;color:var(--al);font-weight:600}
.tl-content{flex:1;font-size:.88em}
.tl-city{font-size:.75em;padding:1px 6px;border-radius:4px;background:rgba(108,92,231,.15);color:var(--al)}
.tl-urgent{color:var(--red);font-weight:600}

/* Top nav */
.topnav{display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(10,10,15,.9);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.topnav .logo{font-weight:800;font-size:1em;color:var(--al)}
.topnav a{padding:6px 14px;border-radius:6px;font-size:.82em;color:var(--dim);transition:all .2s}
.topnav a:hover,.topnav a.active{color:var(--al);background:rgba(108,92,231,.1)}
.topnav .spacer{flex:1}

@media(max-width:768px){.chart-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<nav class="topnav">
  <span class="logo">OPC</span>
  <a href="index.html">首页</a>
  <a href="guangzhou.html">广州专版</a>
  <a href="dashboard.html" class="active">数据看板</a>
  <span class="spacer"></span>
  <a href="https://github.com/siuserxiaowei/guangzhou-opc-policy" target="_blank" style="font-size:.78em">GitHub</a>
</nav>

<div class="container">
  <h1>OPC 全国数据看板</h1>
  <p class="sub">实时政策数据统计与分析</p>

  <div class="stats" id="statsGrid"></div>

  <div class="chart-grid">
    <div class="chart-card">
      <h3>各城市政策数量</h3>
      <div class="bar-chart" id="cityBars"></div>
    </div>
    <div class="chart-card">
      <h3>政策类型分布</h3>
      <div class="donut-wrap">
        <div class="donut" id="categoryDonut"></div>
        <div class="legend" id="categoryLegend"></div>
      </div>
    </div>
  </div>

  <div class="chart-grid">
    <div class="chart-card">
      <h3>最高补贴金额排行（万元）</h3>
      <div class="ranking" id="amountRanking"></div>
    </div>
    <div class="chart-card">
      <h3>即将到期的政策</h3>
      <div class="timeline" id="deadlineTimeline"></div>
    </div>
  </div>

  <div class="chart-grid">
    <div class="chart-card">
      <h3>OPC社区/孵化器数量</h3>
      <div class="bar-chart" id="communityBars"></div>
    </div>
    <div class="chart-card">
      <h3>数据验证状态</h3>
      <div class="donut-wrap">
        <div class="donut" id="verifyDonut"></div>
        <div class="legend" id="verifyLegend"></div>
      </div>
    </div>
  </div>
</div>

<script>
// Load data from JSON directly (static mode) or API
async function loadDashboard() {
  let data;
  try {
    // Try API first
    const resp = await fetch('/api/dashboard');
    if (resp.ok) { data = await resp.json(); }
  } catch(e) {}

  if (!data) {
    // Static mode: compute from policies.json
    const resp = await fetch('data/policies.json');
    const raw = await resp.json();
    data = computeDashboard(raw.policies);
  }
  renderDashboard(data);
}

function computeDashboard(policies) {
  const cityStats = {};
  const categories = {};
  const benefitTypes = {};
  let totalMax = 0;
  let verified = 0;

  policies.forEach(p => {
    const city = p.city || 'unknown';
    if (!cityStats[city]) cityStats[city] = {count:0, max_amount:0, categories:[], communities:0};
    cityStats[city].count++;
    (p.benefits||[]).forEach(b => {
      cityStats[city].max_amount = Math.max(cityStats[city].max_amount, b.amount_max||0);
      totalMax += b.amount_max||0;
      benefitTypes[b.type||'other'] = (benefitTypes[b.type||'other']||0)+1;
    });
    cityStats[city].communities += (p.communities||[]).length;
    categories[p.category||'other'] = (categories[p.category||'other']||0)+1;
    if (p.verified) verified++;
  });

  const upcoming = [];
  const now = new Date();
  policies.forEach(p => {
    const dl = p.application?.deadline;
    if (dl) {
      try {
        const d = new Date(dl);
        const days = Math.ceil((d - now) / 86400000);
        if (days > 0 && days <= 60) upcoming.push({name:p.name, city:p.city, deadline:dl, days_left:days});
      } catch(e){}
    }
  });
  upcoming.sort((a,b) => a.days_left - b.days_left);

  return {
    total_policies: policies.length,
    total_cities: Object.keys(cityStats).length,
    total_communities: Object.values(cityStats).reduce((s,c) => s+c.communities, 0),
    total_max_amount: totalMax,
    city_stats: cityStats,
    categories,
    benefit_types: benefitTypes,
    upcoming_deadlines: upcoming,
    verified,
    unverified: policies.length - verified
  };
}

function renderDashboard(d) {
  // Stats
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat"><div class="n" style="color:var(--cyan)">${d.total_policies}</div><div class="l">政策总数</div></div>
    <div class="stat"><div class="n" style="color:var(--green)">${d.total_cities}</div><div class="l">覆盖城市</div></div>
    <div class="stat"><div class="n" style="color:var(--al)">${d.total_communities}</div><div class="l">OPC社区/孵化器</div></div>
    <div class="stat"><div class="n" style="color:var(--yellow)">${d.verified}</div><div class="l">已验证政策</div></div>
    <div class="stat"><div class="n" style="color:var(--orange)">${d.upcoming_deadlines.length}</div><div class="l">近期截止</div></div>
  `;

  // City bars
  const cities = Object.entries(d.city_stats).sort((a,b) => b[1].count - a[1].count);
  const maxCount = Math.max(...cities.map(c => c[1].count));
  const colors = ['#00e676','#448aff','#ff5252','#ffd600','#00e5ff','#ff9100','#e040fb','#76ff03','#64b5f6','#ffab40','#ff6e40'];
  document.getElementById('cityBars').innerHTML = cities.map(([city, s], i) => `
    <div class="bar-row">
      <div class="bar-label">${city}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(s.count/maxCount*100)}%;background:${colors[i%colors.length]}">
          <span>${s.count} 条</span>
        </div>
      </div>
    </div>
  `).join('');

  // Category donut
  const catMap = {comprehensive:'综合',subsidy:'补贴',space:'空间',computing:'算力',scenario:'场景',competition:'赛事',registration:'注册',talent:'人才',tax:'税优',loan:'贷款'};
  const catColors = ['#6c5ce7','#00e676','#448aff','#00e5ff','#ffd600','#ff9100','#ff5252','#e040fb','#76ff03','#64b5f6'];
  const catEntries = Object.entries(d.categories).sort((a,b) => b[1]-a[1]);
  const catTotal = catEntries.reduce((s,e) => s+e[1], 0);
  let catOffset = 0;
  const catCircles = catEntries.map(([cat,count], i) => {
    const pct = count / catTotal;
    const dash = pct * 314;
    const gap = 314 - dash;
    const circle = `<circle cx="70" cy="70" r="50" fill="none" stroke="${catColors[i%catColors.length]}" stroke-width="18" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-catOffset}" />`;
    catOffset += dash;
    return circle;
  });
  document.getElementById('categoryDonut').innerHTML = `
    <svg viewBox="0 0 140 140">${catCircles.join('')}</svg>
    <div class="donut-center"><div class="n">${catTotal}</div><div class="l">总政策数</div></div>
  `;
  document.getElementById('categoryLegend').innerHTML = catEntries.map(([cat,count], i) => `
    <div class="legend-item"><div class="legend-dot" style="background:${catColors[i%catColors.length]}"></div>${catMap[cat]||cat} (${count})</div>
  `).join('');

  // Amount ranking
  const amtRank = cities.filter(c => c[1].max_amount > 0).sort((a,b) => b[1].max_amount - a[1].max_amount);
  document.getElementById('amountRanking').innerHTML = amtRank.map(([city, s], i) => `
    <div class="rank-item">
      <div class="rank-num ${i<3?'rank-'+(i+1):'rank-other'}">${i+1}</div>
      <div class="rank-name">${city}</div>
      <div class="rank-val">${(s.max_amount/10000).toLocaleString()}万</div>
    </div>
  `).join('');

  // Deadlines
  const tl = d.upcoming_deadlines.slice(0, 8);
  document.getElementById('deadlineTimeline').innerHTML = tl.length
    ? tl.map(t => `
      <div class="tl-item">
        <div class="tl-date">${t.deadline}</div>
        <div class="tl-content">
          ${t.name} <span class="tl-city">${t.city}</span>
          <span class="${t.days_left<=7?'tl-urgent':''}"> (${t.days_left}天后)</span>
        </div>
      </div>
    `).join('')
    : '<div style="color:var(--dim);padding:20px;text-align:center">暂无近期截止政策</div>';

  // Community bars
  const commCities = cities.filter(c => c[1].communities > 0).sort((a,b) => b[1].communities - a[1].communities);
  const maxComm = Math.max(...commCities.map(c => c[1].communities), 1);
  document.getElementById('communityBars').innerHTML = commCities.map(([city, s], i) => `
    <div class="bar-row">
      <div class="bar-label">${city}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${(s.communities/maxComm*100)}%;background:${colors[i%colors.length]}">
          <span>${s.communities} 个</span>
        </div>
      </div>
    </div>
  `).join('');

  // Verify donut
  const vTotal = d.verified + d.unverified;
  const vPct = d.verified / vTotal;
  const vDash = vPct * 314;
  document.getElementById('verifyDonut').innerHTML = `
    <svg viewBox="0 0 140 140">
      <circle cx="70" cy="70" r="50" fill="none" stroke="#1b5e20" stroke-width="18" stroke-dasharray="${vDash} ${314-vDash}" stroke-dashoffset="0" />
      <circle cx="70" cy="70" r="50" fill="none" stroke="#4a1515" stroke-width="18" stroke-dasharray="${314-vDash} ${vDash}" stroke-dashoffset="${-vDash}" />
    </svg>
    <div class="donut-center"><div class="n">${Math.round(vPct*100)}%</div><div class="l">已验证</div></div>
  `;
  document.getElementById('verifyLegend').innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:#00e676"></div>已验证 (${d.verified})</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff5252"></div>待验证 (${d.unverified})</div>
  `;
}

loadDashboard();
</script>
</body>
</html>
